name: Deploy to Nosana

# Automatically redeploys to Nosana on every push to main after Docker build.
# Required secrets:
#   NOSANA_PRIVATE_KEY — Solana keypair as base58 (wallet needs SOL + NOS)
#   NOSANA_ENDPOINT    — Nosana inference endpoint URL (e.g. https://<node-id>.node.k8s.prd.nos.ci)
#                        Get this from `nosana node ls` or the Nosana dashboard.
#                        If not set, the job definition retains its current OPENAI_BASE_URL value.
#
# Setup:
#   1. Settings → Secrets and variables → Actions → New repository secret
#   2. Add NOSANA_PRIVATE_KEY (base58 Solana wallet private key)
#   3. Add NOSANA_ENDPOINT (Nosana GPU node inference URL)
#   4. Ensure wallet has sufficient SOL + NOS for job posting
#
# Nosana CLI: https://learn.nosana.com/cli

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual trigger"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HAS_NOSANA_KEY: ${{ secrets.NOSANA_PRIVATE_KEY != '' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-nosana:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js for Nosana CLI
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Nosana CLI
        run: npm install -g @nosana/cli

      - name: Update job definition with latest image and endpoint
        env:
          NOSANA_ENDPOINT: ${{ secrets.NOSANA_ENDPOINT }}
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          # Update Docker image tag
          jq --arg img "$IMAGE_TAG" '.ops[0].args.image = $img' \
            nos_job_def/nosana_eliza_job_definition.json > /tmp/job_def_updated.json
          # Substitute Nosana inference endpoint if secret is configured
          if [ -n "$NOSANA_ENDPOINT" ]; then
            ENDPOINT_V1="${NOSANA_ENDPOINT%/}/v1"
            jq --arg ep "$ENDPOINT_V1" '.ops[0].args.env.OPENAI_BASE_URL = $ep' \
              /tmp/job_def_updated.json > /tmp/job_def_final.json
            mv /tmp/job_def_final.json /tmp/job_def_updated.json
            echo "Nosana endpoint configured: $ENDPOINT_V1"
          else
            echo "NOSANA_ENDPOINT secret not set — skipping endpoint substitution."
            echo "Set it in repo secrets to enable fully automated deployment."
          fi
          cp /tmp/job_def_updated.json nos_job_def/nosana_eliza_job_definition.json
          echo "Job definition updated to use image: $IMAGE_TAG"

      - name: Deploy to Nosana
        env:
          NOSANA_PRIVATE_KEY: ${{ secrets.NOSANA_PRIVATE_KEY }}
        run: |
          if [ -z "$NOSANA_PRIVATE_KEY" ]; then
            echo "NOSANA_PRIVATE_KEY not configured — skipping Nosana deployment."
            echo "To enable: add NOSANA_PRIVATE_KEY to repository secrets."
            echo "Docker image pushed to GHCR: ghcr.io/${{ env.IMAGE_NAME }}:latest"
            exit 0
          fi
          nosana job post \
            --file nos_job_def/nosana_eliza_job_definition.json \
            --market nvidia-3090 \
            --wait
          echo "Nosana deployment complete."
